name: Update Shuck

on:
  schedule:
    - cron: '17 8 * * 2'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
    steps:
      - name: Check automation token
        id: token
        shell: bash
        run: |
          if [[ -n "$RELEASE_PAT" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::RELEASE_PAT is not configured; dependency update automation is disabled."
          fi
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        if: steps.token.outputs.configured == 'true'
        with:
          persist-credentials: true
          token: ${{ env.RELEASE_PAT }}
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        if: steps.token.outputs.configured == 'true'
        with:
          run_install: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        if: steps.token.outputs.configured == 'true'
        with:
          cache: pnpm
          node-version: '24'
      - if: steps.token.outputs.configured == 'true'
        run: pnpm install --frozen-lockfile
      - name: Resolve latest complete Shuck release
        if: steps.token.outputs.configured == 'true'
        id: update
        env:
          GH_TOKEN: ${{ env.RELEASE_PAT }}
        run: node scripts/update-shuck-version.mjs
      - name: Validate update
        if: steps.update.outputs.changed == 'true'
        run: pnpm check
      - name: Open update pull request
        if: steps.update.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ env.RELEASE_PAT }}
          NEXT_VERSION: ${{ steps.update.outputs.next-version }}
        run: |
          set -euo pipefail
          branch="automation/shuck-v${NEXT_VERSION}"
          if gh pr view "$branch" >/dev/null 2>&1; then
            echo "An update pull request for Shuck v${NEXT_VERSION} already exists."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git switch -C "$branch"
          git add action.yml
          git commit -m "fix(deps): update default Shuck to v${NEXT_VERSION}"
          git push --set-upstream origin "$branch"
          gh pr create \
            --base main \
            --head "$branch" \
            --title "fix(deps): update default Shuck to v${NEXT_VERSION}" \
            --body "Updates the action's tested default to Shuck v${NEXT_VERSION}. All required release archives and checksums were present, and the action test suite passed."
